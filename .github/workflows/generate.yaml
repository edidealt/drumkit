name: Generate WebDAV index

on:
  push:
    branches: [main]
    paths:
      - kit/**

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.json and propfind.xml
        run: |
          node << 'EOF'
          const fs   = require("fs");
          const path = require("path");
          const { execSync } = require("child_process");

          const config = JSON.parse(fs.readFileSync("config.json", "utf8"));
          const AUDIO_EXTS = new Set(config.audioExtensions ?? [
            ".flac", ".wav", ".mp3", ".ogg", ".aiff", ".aif", ".opus", ".m4a"
          ]);
          const IGNORE = new Set([".git", ".github", "functions", "node_modules"]);

          const CONTENT_TYPES = {
            ".flac": "audio/flac",
            ".wav":  "audio/wav",
            ".mp3":  "audio/mpeg",
            ".ogg":  "audio/ogg",
            ".aiff": "audio/aiff",
            ".aif":  "audio/aiff",
            ".opus": "audio/opus",
            ".m4a":  "audio/mp4",
          };

          function walk(dir, base) {
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (IGNORE.has(entry.name)) continue;
              const rel  = base ? `${base}/${entry.name}` : entry.name;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...walk(full, rel));
              } else {
                const ext = path.extname(entry.name).toLowerCase();
                if (!AUDIO_EXTS.has(ext)) continue;
                const stat = fs.statSync(full);
                let mtime;
                try {
                  mtime = execSync(
                    `git log -1 --format=%cI -- "${full}"`,
                    { encoding: "utf8" }
                  ).trim();
                } catch (_) {}
                if (!mtime) mtime = new Date().toISOString();
                results.push({
                  path: "/" + rel,
                  size: stat.size,
                  mtime,
                  type: CONTENT_TYPES[ext] ?? "application/octet-stream",
                });
              }
            }
            return results;
          }

          const KIT_DIR = "kit";
          if (!fs.existsSync(KIT_DIR)) {
            console.error("No kit/ directory found, nothing to generate.");
            process.exit(1);
          }

          // Walk only kit/, but strip the "kit" prefix so DAV paths root at /
          const files = walk(KIT_DIR, "").map(f => ({
            ...f,
            path: f.path.replace(/^\/kit/, "") || "/",
          }));

          // --- index.json ---
          fs.writeFileSync("index.json", JSON.stringify({ files }, null, 2));
          console.log(`Wrote index.json (${files.length} files)`);

          // --- collect all unique directory paths ---
          const dirs = new Set(["/"]);
          for (const f of files) {
            const parts = f.path.split("/").slice(1, -1);
            let cur = "";
            for (const p of parts) {
              cur += "/" + p;
              dirs.add(cur);
            }
          }

          // --- XML helpers ---
          function esc(s) {
            return s
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;");
          }

          function httpDate(iso) {
            return new Date(iso).toUTCString();
          }

          function dirBlock(dirPath) {
            const displayName = dirPath === "/"
              ? esc(config.name ?? "Drumkit")
              : esc(path.basename(dirPath));
            return `  <D:response>
    <D:href>${esc(dirPath)}</D:href>
    <D:propstat>
      <D:prop>
        <D:displayname>${displayName}</D:displayname>
        <D:resourcetype><D:collection/></D:resourcetype>
        <D:getlastmodified>${httpDate(new Date().toISOString())}</D:getlastmodified>
      </D:prop>
      <D:status>HTTP/1.1 200 OK</D:status>
    </D:propstat>
  </D:response>`;
          }

          function fileBlock(f) {
            return `  <D:response>
    <D:href>${esc(f.path)}</D:href>
    <D:propstat>
      <D:prop>
        <D:displayname>${esc(path.basename(f.path))}</D:displayname>
        <D:resourcetype/>
        <D:getcontenttype>${f.type}</D:getcontenttype>
        <D:getcontentlength>${f.size}</D:getcontentlength>
        <D:getlastmodified>${httpDate(f.mtime)}</D:getlastmodified>
      </D:prop>
      <D:status>HTTP/1.1 200 OK</D:status>
    </D:propstat>
  </D:response>`;
          }

          const responses = [
            ...[...dirs].sort().map(dirBlock),
            ...files.map(fileBlock),
          ].join("\n");

          const xml = `<?xml version="1.0" encoding="utf-8"?>
          <D:multistatus xmlns:D="DAV:">
          ${responses}
          </D:multistatus>`.replace(/^ {10}/gm, "");

          fs.writeFileSync("propfind.xml", xml);
          console.log(`Wrote propfind.xml (${dirs.size} dirs, ${files.length} files)`);
          EOF

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate index.json and propfind.xml"
          file_pattern: "index.json propfind.xml"
