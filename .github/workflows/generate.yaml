name: Generate WebDAV index

on:
  push:
    branches: [main]
    paths:
      - kit/**

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.json and propfind.xml
        run: node .github/scripts/generate.js

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate index.json and propfind.xml"
          file_pattern: "index.json propfind.xml"
